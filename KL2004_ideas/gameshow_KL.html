<!DOCTYPE html>
<html lang="en">
  <head>
	  <meta charset="UTF-8">
	  <meta name="viewport" contents="width=device-width, initial-scale=1.0">
    <title>Game Show to Go</title>
    <link rel="stylesheet" href="template_styles.css">
  </head>

  <body>
	  <div class="banner"> <img src="gsl_screenshot.jpg"> </div>

    <style>
     .banner {
            width: 100%;
            height: 250px;  /* control banner height here */
            overflow: hidden;
        }
        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;  /* fills entire space */
            object-position: center 50%; /* adjust vertical focus */
            display: block;
        }
     table, th  {
        width: 100%;
        table-layout: fixed;
        border: 3px solid rgb(255, 255, 255);
        border-collapse:collapse;         
      }    
    </style>  

  <!-- Banner (GAME SHOW style) -->
  <header class="banner">
    <div class="game">GAME</div>
    <div class="show">SHOW</div>
  </header>

    <table>
